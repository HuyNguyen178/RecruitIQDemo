spring.application.name=RecruitIQ
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recruitiq}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ghuy$178}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:recruitiq_jwt_secret_key_must_be_at_least_256_bits_long_for_security}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# LLM API
llm.api.key=
llm.api.url=https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent
llm.api.model=gemini-2.5-flash

# File Upload
upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB

# Thymeleaf
spring.thymeleaf.cache=false

# Async
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
