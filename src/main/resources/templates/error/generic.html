<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${errorTitle} ?: 'Error'">Error</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; color: #333; }
        .card { max-width: 640px; margin: 0 auto; padding: 1.5rem; border: 1px solid #e5e7eb; border-radius: 8px; }
        .code { font-weight: 600; color: #b91c1c; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="${errorTitle} ?: 'Unexpected error'">Unexpected error</h1>
    <p th:text="${errorMessage} ?: 'Something went wrong.'">Something went wrong.</p>
    <p>Status: <span class="code" th:text="${statusCode} ?: 500">500</span></p>
</div>
</body>
</html>
